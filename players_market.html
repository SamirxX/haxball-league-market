<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Issue Prim League - Dynamic Transfer Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0c0e14;
            --bg-card: #141722;
            --bg-input: #1b1f2e;
            --accent-gold: #e5b842;
            --accent-gold-dark: #b88f28;
            --text-main: #f0f2f5;
            --text-muted: #8b95a5;
            --border-color: #262b3d;
            --radius-md: 10px;
            --radius-lg: 16px;
            --font-sans: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1380px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
            padding: 24px 32px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .brand-box {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(229, 184, 66, 0.4));
        }

        .brand-title h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
        }

        .brand-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .stats-summary {
            display: flex;
            gap: 16px;
        }

        .stat-pill {
            background: rgba(229, 184, 66, 0.1);
            border: 1px solid rgba(229, 184, 66, 0.3);
            padding: 10px 18px;
            border-radius: var(--radius-md);
            text-align: right;
        }

        .stat-pill .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-pill .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-gold);
            font-family: var(--font-mono);
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 18px 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 10px 14px 10px 40px;
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-gold);
        }

        .table-wrapper {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.02);
            padding: 16px 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255,255,255,0.015);
        }

        .player-num {
            font-family: var(--font-mono);
            color: var(--text-muted);
            font-weight: 600;
            width: 50px;
        }
        
        .price-text {
            color: var(--accent-gold);
            font-family: var(--font-mono);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="brand-box">
                <img src="logo.png" alt="Skill Issue Prim League Logo" class="brand-logo" onerror="this.src='https://i.imgur.com/8Q9Z5bX.png'">
                <div class="brand-title">
                    <h1>SKILL ISSUE PRIM LEAGUE</h1>
                    <p>Official Transfer Market Roster</p>
                </div>
            </div>
            <div class="stats-summary">
                <div class="stat-pill">
                    <div class="label">Total Registered</div>
                    <div class="value" id="total-players-count">0</div>
                </div>
                <div class="stat-pill">
                    <div class="label">Total Market Value</div>
                    <div class="value" id="total-market-value">€0.0M</div>
                </div>
            </div>
        </header>

        <!-- Controls -->
        <div class="controls-bar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Search player, position, or club...">
            </div>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">#</th>
                        <th>Player Name</th>
                        <th>Club</th>
                        <th style="width: 130px;">Pos</th>
                        <th style="width: 160px;">Value</th>
                        <th style="width: 140px;">Status</th>
                    </tr>
                </thead>
                <tbody id="player-table-body">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let players = [];

        async function fetchSharedPlayers() {
            try {
                const res = await fetch('shared_market.json?v=' + Date.now());
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.length > 0) {
                        players = data;
                        renderTable(document.getElementById("search-input").value);
                    }
                }
            } catch (err) {
                console.log("Realtime fetch info:", err);
            }
        }

        function formatDisplayPrice(price) {
            let p = Number(price) || 0;
            if (p < 1000) return p.toFixed(1); // Already in millions
            return (p / 1000000).toFixed(1);
        }

        function renderTable(filterQuery = "") {
            const tbody = document.getElementById("player-table-body");
            tbody.innerHTML = "";

            let totalValue = 0;
            const filtered = players.filter(p => 
                (p.name || "").toLowerCase().includes(filterQuery.toLowerCase()) ||
                (p.club || "").toLowerCase().includes(filterQuery.toLowerCase()) ||
                (p.pos || "").toLowerCase().includes(filterQuery.toLowerCase())
            );

            filtered.forEach((p, index) => {
                let numericPrice = Number(p.price) || 0;
                totalValue += numericPrice < 1000 ? numericPrice : (numericPrice / 1000000);
                p.num = index + 1; // Re-index dynamically
                
                const tr = document.createElement("tr");
                tr.innerHTML = \`
                    <td class="player-num">${p.num}</td>
                    <td><strong>${p.name || ''}</strong></td>
                    <td>${p.club || 'Free Agent'}</td>
                    <td>${p.pos || 'N/A'}</td>
                    <td class="price-text">€${formatDisplayPrice(p.price)}M</td>
                    <td>
                        <span style="color: ${p.status === 'Signed' ? 'var(--text-main)' : 'var(--text-muted)'}">
                            ${p.status || 'Free Agent'}
                        </span>
                    </td>
                \`;
                tbody.appendChild(tr);
            });

            document.getElementById("total-players-count").textContent = players.length;
            document.getElementById("total-market-value").textContent = "€" + totalValue.toFixed(1) + "M";
        }

        document.getElementById("search-input").addEventListener("input", (e) => renderTable(e.target.value));

        fetchSharedPlayers();
        setInterval(fetchSharedPlayers, 3000);
    </script>
</body>
</html>
